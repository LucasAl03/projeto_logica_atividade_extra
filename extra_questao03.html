<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>
    <div id="geral">

    <h3> Um comerciante calcula o valor da venda dos produtos de
seu estabelecimento tendo em vista à tabela abaixo: <p></p> Elabore um o algoritmo que possa entrar com nome do produto
e valor da compra e imprima o nome do produto e o valor
da venda.
        
    <form id="formulario">

        <label for="name"> Nome do Produto: </label>
        <input type="text" name="name" id="name">

        <label for="valor"> Valor do Produto: </label>
        <input type="text" step="any" name="valor" id="valor">

        <button type="submit"> Verificar </button>
        <button type="reset"> Limpar </button>

    </form>

    <div id="resultado">

    </div>
    </div>


</body>
